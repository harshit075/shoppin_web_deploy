name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        run: |
          docker build -t harshitborana75146/shopping_web:frontend ./client
          docker push harshitborana75146/shopping_web:frontend

      - name: Build & Push Backend
        run: |
          docker build -t harshitborana75146/shopping_web:backend ./server
          docker push harshitborana75146/shopping_web:backend

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/shop_web
            docker compose pull
            docker compose up -d --remove-orphans
